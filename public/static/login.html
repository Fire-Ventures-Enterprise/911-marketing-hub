<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Sign In — Marketing Hub</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-wrap {
      width: 100%;
      max-width: 380px;
    }
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-icon { font-size: 36px; margin-bottom: 10px; }
    .brand-name {
      font-size: 20px;
      font-weight: 800;
      color: #f1f5f9;
      letter-spacing: -0.02em;
    }
    .brand-sub {
      font-size: 12px;
      color: #475569;
      margin-top: 3px;
    }
    .card {
      background: #0f172a;
      border: 1px solid #1e2d40;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 6px;
    }
    .card-sub {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }
    input {
      width: 100%;
      background: #0d1420;
      border: 1px solid #1e2d40;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
      margin-bottom: 16px;
    }
    input:focus { border-color: #3b82f6; }
    input::placeholder { color: #334155; }
    .btn {
      width: 100%;
      background: #CC0000;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      padding: 11px;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
      margin-top: 4px;
    }
    .btn:hover { background: #aa0000; }
    .btn:disabled { opacity: 0.6; cursor: default; }
    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px;
      color: #f87171;
      font-size: 13px;
      padding: 10px 12px;
      margin-bottom: 16px;
      display: none;
    }
    .error.show { display: block; }
    .footer-note {
      text-align: center;
      font-size: 11px;
      color: #334155;
      margin-top: 20px;
    }
    .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0d1117; }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid #1e2d40;
      border-top-color: #CC0000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="root" class="loading"><div class="spinner"></div></div>

<script>
(async function checkAlreadyAuthed() {
  try {
    const r = await fetch('/api/auth/me');
    if (r.ok) {
      const { user } = await r.json();
      if (user) { window.location.replace('/app'); return; }
    }
  } catch {}
  showForm();
})();

function showForm() {
  document.getElementById('root').className = '';
  document.getElementById('root').innerHTML = `
    <div class="login-wrap">
      <div class="brand">
        <div class="brand-icon">🚨</div>
        <div class="brand-name">Marketing Hub</div>
        <div class="brand-sub">Fire Ventures Enterprise</div>
      </div>
      <div class="card">
        <div class="card-title">Sign In</div>
        <div class="card-sub">Enter your credentials to access the hub</div>
        <div class="error" id="err"></div>
        <form id="login-form" onsubmit="handleLogin(event)">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
          <button type="submit" class="btn" id="submit-btn">Sign In</button>
        </form>
      </div>
      <div class="footer-note">Services Leads Marketing Hub &mdash; v2.1.0</div>
    </div>`;
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const err = document.getElementById('err');
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  err.className = 'error';

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await r.json();
    if (r.ok && data.success) {
      window.location.replace('/app');
    } else {
      err.textContent = data.error || 'Invalid credentials';
      err.className = 'error show';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  } catch {
    err.textContent = 'Network error — please try again';
    err.className = 'error show';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}
</script>
</body>
</html>
